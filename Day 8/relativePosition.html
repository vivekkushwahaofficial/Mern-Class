<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

    .p1 {
      position: relative;
      top: 100px;
      height: 100px;
      background-color: yellow;
      width: 100px;

    .p2{

      position: sticky;

      top: 100px;
    }

</head>

<body>
  <p class="p1">Lorem ipsum dolor sit amet.</p>
  <p class="p2">Lorem ipsum dolor sit amet.</p>
</body>

</html>
